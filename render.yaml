# Render Blueprint — deploys the NestJS API, the FastAPI AI service, and a
# Postgres database together. In the Render dashboard: New -> Blueprint ->
# select this repo. Render will read this file automatically.
#
# NOTE: written offline (this environment's network policy blocks
# render.com's docs/API), so double-check it against Render's Blueprint
# preview before confirming — it validates syntax without creating anything.
# (envVarGroups at the service level was tried and rejected by Render's own
# validator — "field envVarGroups not found in type file.Service" — so the
# shared secret below is a plain literal value instead.)

databases:
  - name: datacon-db
    databaseName: datacon
    user: datacon
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: datacon-api
    env: node
    plan: free
    region: oregon
    rootDir: app
    buildCommand: >-
      npm install --include=dev &&
      npm run build --workspace=packages/shared-types &&
      npx prisma generate --schema packages/prisma/schema.prisma &&
      npm run build --workspace=packages/prisma &&
      npx prisma migrate deploy --schema packages/prisma/schema.prisma &&
      npm run prisma:seed &&
      npm run build --workspace=api
    startCommand: node api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: datacon-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CONNECTOR_ENCRYPTION_KEY
        generateValue: true
      # Shared secret so this service can call datacon-ai's /internal/*
      # routes — must be set to the exact same literal value on both
      # services below (Render's Blueprint spec has no cross-service
      # variable-sharing construct that validated successfully offline).
      - key: INTERNAL_AUTH_TOKEN
        value: D5kFW75jd7oLQhF0Tx_yMk3JsAnr8Tkd8YbF1WjlzoE
      # Set after the ai service's first deploy — see its onrender.com URL in
      # the Render dashboard (predictable as https://datacon-ai.onrender.com
      # given the service name below, but confirm rather than assume).
      - key: AI_SERVICE_URL
        sync: false
      # Set to the Vercel deployment's URL once that's live (e.g.
      # https://datacon.vercel.app) — needed for the auth cookie's CORS check.
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: datacon-ai
    env: python
    plan: free
    region: oregon
    rootDir: app/ai
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: INTERNAL_AUTH_TOKEN
        value: D5kFW75jd7oLQhF0Tx_yMk3JsAnr8Tkd8YbF1WjlzoE
      # No persistent disk on the free plan, so this lives on the service's
      # ephemeral local filesystem — the ChromaDB index is rebuilt from
      # re-uploaded documents after a redeploy/restart. Upgrade to a paid
      # plan and add a `disk:` block back here if that's undesirable.
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma
      - key: GEMINI_MODEL
        value: gemma-4-31b-it
      # Optional — leave unset to run on the offline (no-API-key) fallback.
      # Paste the real key in via the Render dashboard's Environment tab —
      # never commit it here.
      - key: GEMINI_API_KEY
        sync: false
