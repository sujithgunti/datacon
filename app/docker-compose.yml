version: "3.9"

# Local dev infrastructure. Supabase Postgres is used for the app's own
# primary database in real deployments (DATABASE_URL in .env); the
# containers below are sample *external* data sources for the Postgres/
# MySQL/MongoDB connector engines, plus the ChromaDB vector store.
services:
  # The app's own primary database for local dev, so the stack is runnable
  # before a Supabase project exists. Point DATABASE_URL at Supabase in
  # staging/production; this container is dev-only.
  app_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: datacon
      POSTGRES_PASSWORD: datacon
      POSTGRES_DB: datacon
    ports:
      - "5432:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data

  sample_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
      POSTGRES_DB: analytics
    ports:
      - "55432:5432"
    volumes:
      - sample_postgres_data:/var/lib/postgresql/data

  sample_mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: analytics
      MYSQL_USER: analyst
      MYSQL_PASSWORD: analyst
    ports:
      - "53306:3306"
    volumes:
      - sample_mysql_data:/var/lib/mysql

  sample_mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: analyst
      MONGO_INITDB_ROOT_PASSWORD: analyst
      MONGO_INITDB_DATABASE: analytics
    ports:
      - "57017:27017"
    volumes:
      - sample_mongo_data:/data/db

  chroma:
    image: chromadb/chroma:0.5.20
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  app_postgres_data:
  sample_postgres_data:
  sample_mysql_data:
  sample_mongo_data:
  chroma_data:
